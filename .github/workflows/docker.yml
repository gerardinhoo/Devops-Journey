name: CI (legacy projects)

on:
  push:
    branches: ['main']
    paths:
      - 'simple-node-api/**'
      - 'docker-python-flask/**'
  workflow_dispatch:

jobs:
  build-simple-node-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build simple-node-api image
        uses: docker/build-push-action@v6
        with:
          context: ./simple-node-api
          push: false
          tags: simple-node-api:ci
      - name: Verify simple-node-api metadata
        run: test -f simple-node-api/package.json

  build-docker-python-flask:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docker-python-flask image
        uses: docker/build-push-action@v6
        with:
          context: ./docker-python-flask
          push: false
          tags: docker-python-flask:ci
